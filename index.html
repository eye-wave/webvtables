<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>webvtable</title>

    <script type="module" src="/src/main.ts"></script>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header>
      <svg class="knob" id="header_freq" width="48" height="48" /><svg
        class="knob"
        id="header_volume"
        width="48"
        height="48"
      />
    </header>
    <div id="viewport">
      <div class="camera">
        <span>X:</span><span id="cam_x">0.0</span><span>Y:</span
        ><span id="cam_y">0.0</span><span>Zoom:</span
        ><span id="cam_z">1.0</span>
      </div>
      <canvas id="canvas_graph"></canvas>
    </div>

    <div class="menu" id="menu" style="display: none"></div>
    <div class="search-menu menu" id="search_menu" style="display: none"></div>
  </body>
</html>
